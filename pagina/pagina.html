<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Página Tecmilenio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Logo -->
        <img src="logo.jpeg" alt="Logo Tecmilenio" class="logo">

        <!-- Tu foto -->
        <img src="mi_foto.jpeg" alt="Mi foto" class="foto">

        <!-- Nombre -->
        <h1>Soto Betancourt Christopher Eduardo</h1>

        <!-- Correo -->
        <p>a107098518@tecmilenio.mx</p>

        <!-- Botón info -->
        <button onclick="mostrarInfo()">Ver información</button>

        <!-- Botón bandera -->
        <button onclick="mostrarBandera()">Ver bandera de México</button>

        <!-- Imagen de bandera oculta -->
        <img id="bandera" src="https://upload.wikimedia.org/wikipedia/commons/f/fc/Flag_of_Mexico.svg" width="300"
            style="display:none;">

    </div>

    <script>
        function mostrarInfo() {
            let ventana = window.open("", "", "width=400,height=400");
            ventana.document.write(`
                <h2>Matrícula: a107098518</h2>
                <img src="mi_foto.jpeg" width="200">
            `);
        }

        function mostrarBandera() {
            document.getElementById("bandera").style.display = "block";
        }
    </script>

</body>

</html>
